<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docking System</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    background: #e0e0e0;
    overflow: hidden;
    height: 100vh;
}

#docking-container {
    width: 100%; height: 100vh;
    display: flex; position: relative;
}

/* ── Layout wrappers ── */
.dock-row    { display:flex; flex:1; position:relative; }
.dock-column { display:flex; flex-direction:column; flex:1; position:relative; }

/* ══════════════════════════════════════
   DOCK SHELL
══════════════════════════════════════ */
.dock {
    background: white;
    border: 1px solid #ccc;
    display: flex; flex-direction: column;
    min-width:200px; min-height:150px;
    position: relative; flex:1; overflow:hidden;
}

/* ══════════════════════════════════════
   TABS GROUP HEADER
   Shown on Ctrl when dock has 2+ panels.
   Controls the whole collection.
   Replaces the tabs-bar while visible.
══════════════════════════════════════ */
.tabs-group-header {
    display: none;
    background: #1a1a2e;
    color: #c8c8d8;
    padding: 4px 8px;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    font-size: 11px;
    z-index: 10;
    animation: hdrIn .12s ease;
}
.tabs-group-header.visible { display:flex; }

.tgh-label { opacity:.5; letter-spacing:.05em; text-transform:uppercase; font-size:10px; }
.tgh-controls { display:flex; gap:3px; }

.tgh-btn {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    color: #c8c8d8;
    padding: 2px 8px; cursor:pointer;
    font-size:11px; border-radius:2px;
    height:20px; display:flex; align-items:center; gap:3px;
    white-space:nowrap;
}
.tgh-btn:hover       { background:rgba(255,255,255,.22); }
.tgh-move            { cursor:grab; }
.tgh-move:active     { cursor:grabbing; }
.tgh-ungroup         { color:#f0c060; }
.tgh-ungroup:hover   { background:rgba(240,192,96,.2); border-color:rgba(240,192,96,.4); }

/* ══════════════════════════════════════
   DOCK HEADER  (Ctrl — this dock/tab only)
══════════════════════════════════════ */
.dock-header {
    display: none;
    background: #ececec;
    border-bottom: 1px solid #d4d4d4;
    padding: 4px 8px;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
    animation: hdrIn .12s ease;
}
.dock-header.visible { display:flex; }

@keyframes hdrIn {
    from { opacity:0; transform:translateY(-3px); }
    to   { opacity:1; transform:translateY(0); }
}

.dock-title    { font-size:12px; color:#333; font-weight:600; }
.dock-controls { display:flex; gap:3px; }

.dc-btn {
    width:22px; height:22px;
    border:1px solid #ccc; background:white; color:#555;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:13px; line-height:1; border-radius:2px; flex-shrink:0;
}
.dc-btn:hover           { background:#f0f0f0; border-color:#999; }
.dh-move                { cursor:grab; }
.dh-move:active         { cursor:grabbing; }
.dh-tabify              { cursor:grab; color:#0066cc; font-size:12px; }
.dh-tabify:hover        { background:#e6f0ff; border-color:#4488cc; }
.dh-tabify:active       { cursor:grabbing; }
.dh-remove:hover        { background:#fee; border-color:#f88; color:#c00; }

/* ══════════════════════════════════════
   DOCK BODY  (tabs-bar + content)
══════════════════════════════════════ */
.dock-body {
    display:flex; flex:1; overflow:hidden;
    min-height:0; min-width:0;
}

.dock[data-tabs-pos="top"]    > .dock-body { flex-direction:column; }
.dock[data-tabs-pos="bottom"] > .dock-body { flex-direction:column-reverse; }
.dock[data-tabs-pos="left"]   > .dock-body { flex-direction:row; }
.dock[data-tabs-pos="right"]  > .dock-body { flex-direction:row-reverse; }

/* ══════════════════════════════════════
   TABS BAR
══════════════════════════════════════ */
.dock-tabs-bar {
    display:flex; flex-shrink:0;
    background:#f2f2f2; scrollbar-width:none;
}
.dock-tabs-bar::-webkit-scrollbar { display:none; }
.dock-tabs-bar.ctrl-hidden { display:none !important; }

/* Horizontal (top / bottom) */
.dock[data-tabs-pos="top"]    > .dock-body > .dock-tabs-bar,
.dock[data-tabs-pos="bottom"] > .dock-body > .dock-tabs-bar {
    flex-direction:row; overflow-x:auto;
    border-bottom:1px solid #d8d8d8;
}
.dock[data-tabs-pos="bottom"] > .dock-body > .dock-tabs-bar {
    border-bottom:none; border-top:1px solid #d8d8d8;
}

/* Vertical (left / right) */
.dock[data-tabs-pos="left"]  > .dock-body > .dock-tabs-bar,
.dock[data-tabs-pos="right"] > .dock-body > .dock-tabs-bar {
    flex-direction:column; width:90px; overflow-y:auto;
    border-right:1px solid #d8d8d8;
}
.dock[data-tabs-pos="right"] > .dock-body > .dock-tabs-bar {
    border-right:none; border-left:1px solid #d8d8d8;
}

/* Tab items */
.dock-tab {
    display:flex; align-items:center; gap:4px;
    padding:5px 9px; font-size:11px; cursor:pointer;
    white-space:nowrap; color:#777; flex-shrink:0;
    user-select:none; border-bottom:2px solid transparent;
    transition:background .1s;
}
.dock-tab:hover  { background:#e6e6e6; }
.dock-tab.active { background:white; color:#111; border-bottom-color:#444; }

.dock[data-tabs-pos="left"]  > .dock-body > .dock-tabs-bar > .dock-tab,
.dock[data-tabs-pos="right"] > .dock-body > .dock-tabs-bar > .dock-tab {
    border-bottom:none; border-right:2px solid transparent;
    white-space:normal; word-break:break-word;
    width:100%; padding:7px 8px; font-size:10px;
}
.dock[data-tabs-pos="left"]  > .dock-body > .dock-tabs-bar > .dock-tab.active { border-right-color:#444; }
.dock[data-tabs-pos="right"] > .dock-body > .dock-tabs-bar > .dock-tab {
    border-right:none; border-left:2px solid transparent;
}
.dock[data-tabs-pos="right"] > .dock-body > .dock-tabs-bar > .dock-tab.active { border-left-color:#444; }

.tab-title { flex:1; overflow:hidden; text-overflow:ellipsis; pointer-events:none; }
.tab-close {
    border:none; background:none; cursor:pointer;
    color:#bbb; font-size:10px; line-height:1;
    width:14px; height:14px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    border-radius:2px;
}
.tab-close:hover { background:#fcc; color:#c00; }

/* ══════════════════════════════════════
   DOCK MAIN / CONTENT
══════════════════════════════════════ */
.dock-main {
    display:flex; flex-direction:column;
    flex:1; overflow:hidden; min-width:0; min-height:0;
}
.dock-content {
    flex:1; overflow:auto;
    display:flex; flex-direction:column;
}
.dock-panel { display:none; flex-direction:column; flex:1; padding:15px; min-height:0; }
.dock-panel.active { display:flex; }
.dock-card {
    background:#fafafa; border:1px solid #e4e4e4; flex:1;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; color:#bbb; min-height:80px;
}

/* Drag state */
.dock.dragging { opacity:.35; pointer-events:none; }

/* ══════════════════════════════════════
   DROP INDICATORS
══════════════════════════════════════ */
.drop-indicator {
    position:absolute; pointer-events:none; z-index:900; display:none;
}
.drop-indicator.active { display:block; }

/* Move / extract-as-dock mode */
.drop-indicator.top    { top:0;left:0;right:0;height:33%; background:rgba(220,50,50,.13);border:2px dashed #d44; }
.drop-indicator.bottom { bottom:0;left:0;right:0;height:33%; background:rgba(240,140,0,.13);border:2px dashed #e90; }
.drop-indicator.left   { top:0;left:0;bottom:0;width:33%; background:rgba(50,170,50,.13);border:2px dashed #4a4; }
.drop-indicator.right  { top:0;right:0;bottom:0;width:33%; background:rgba(40,100,220,.13);border:2px dashed #46c; }
.drop-indicator.center { top:25%;left:25%;right:25%;bottom:25%; background:rgba(140,60,200,.13);border:2px dashed #96c;border-radius:4px; }
.drop-indicator.center::after {
    content:'⇄ Swap';
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:10px;color:#806;font-weight:700;pointer-events:none;
    white-space:nowrap;background:rgba(255,255,255,.85);padding:2px 6px;border-radius:3px;
}

/* Tabify mode — all 5 zones */
.drop-indicator.tabify-zone {
    display:block !important;
    border-style:solid !important; border-width:1.5px !important;
    background:rgba(0,110,200,.06) !important; border-color:#2288cc !important;
}
.drop-indicator.tabify-zone.active-zone {
    background:rgba(0,110,200,.24) !important;
    border-color:#005faa !important; border-width:2px !important;
}
.drop-indicator.tabify-zone::after {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:10px;font-weight:700;color:#004e99;
    white-space:nowrap;pointer-events:none;
    background:rgba(255,255,255,.9);padding:2px 7px;border-radius:3px;
    letter-spacing:.03em;text-transform:uppercase;
}
.drop-indicator.center.tabify-zone::after { content:'⊞ Add Tab' !important; color:#004e99 !important; }
.drop-indicator.top.tabify-zone::after    { content:'⬆ Top Tabs'; }
.drop-indicator.bottom.tabify-zone::after { content:'⬇ Bottom Tabs'; }
.drop-indicator.left.tabify-zone::after   { content:'⬅ Left Tabs'; }
.drop-indicator.right.tabify-zone::after  { content:'➡ Right Tabs'; }

/* ══════════════════════════════════════
   RESIZE HANDLES
══════════════════════════════════════ */
.resize-handle { position:absolute; background:transparent; z-index:100; }
.resize-handle:hover, .resize-handle.resizing { background:#b0b0b0; }
.resize-handle.vertical   { width:4px;height:100%;right:-2px;top:0;cursor:ew-resize; }
.resize-handle.horizontal { height:4px;width:100%;bottom:-2px;left:0;cursor:ns-resize; }

/* ══════════════════════════════════════
   CONNECTION POINTS
══════════════════════════════════════ */
.connection-point {
    position:fixed; width:10px; height:10px;
    background:#999; border:2px solid white;
    border-radius:50%; z-index:200; pointer-events:all;
    box-shadow:0 0 0 1px #bbb;
}

/* ══════════════════════════════════════
   HINT
══════════════════════════════════════ */
#ctrl-hint {
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    background:rgba(20,20,20,.84);color:#eee;
    padding:5px 16px;border-radius:20px;font-size:11px;
    opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;
}
#ctrl-hint.show { opacity:1; }
kbd { background:#555;padding:1px 5px;border-radius:3px;font-family:monospace; }
</style>
</head>
<body>

<div id="docking-container"></div>
<div id="ctrl-hint">Press <kbd>Ctrl</kbd> while hovering a dock to toggle controls</div>

<script>
class DockingSystem {
    constructor(containerId) {
        this.container       = document.getElementById(containerId);
        this.docks           = [];
        // dragMode: 'move' | 'tabify' | 'detach' | 'tab-move'
        // 'move'     → whole dock repositioned, center=swap
        // 'tabify'   → whole dock merged as tab(s), zone=tab-bar direction
        // 'detach'   → single panel extracted from tabs → placed as individual dock (center=swap)
        // 'tab-move' → single panel moved to another dock/tabs-group as tab
        this.dragMode        = null;
        this.draggedDock     = null;
        this.extractPanelIdx = null;
        this.dropTarget      = null;
        this.dropZone        = null;
        this.resizing        = null;
        this.dockCounter     = 0;
        this.panelCounter    = 0;
        this.hoveredDock     = null;
        this.hintTimeout     = null;
        this.init();
    }

    /* ─────────────── INIT ─────────────── */
    init() {
        this.createDock();
        this.createDock();
        this.createDock();
        this.updateResizeHandles();
        this.updateConnectionPoints();

        document.addEventListener('mousemove', this.onMouseMove.bind(this));
        document.addEventListener('mouseup',   this.onMouseUp.bind(this));

        // Ctrl → toggle both headers on the currently hovered dock
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Control' || e.repeat || !this.hoveredDock) return;
            const dock = this.hoveredDock;
            const hdr  = dock.querySelector(':scope > .dock-header');
            hdr?.classList.contains('visible')
                ? this.hideDockHeaders(dock)
                : this.showDockHeaders(dock);
        });

        window.addEventListener('blur', () => this.hideAllDockHeaders());
        this.container.addEventListener('mouseenter', () => this.showHint(), { once: true });
    }

    showHint() {
        const el = document.getElementById('ctrl-hint');
        el.classList.add('show');
        clearTimeout(this.hintTimeout);
        this.hintTimeout = setTimeout(() => el.classList.remove('show'), 4500);
    }

    /* ─────────────── CTRL HEADERS ─────────────── */
    showDockHeaders(dock) {
        dock.querySelector(':scope > .dock-header')?.classList.add('visible');
        if (dock.panelData.length > 1) {
            dock.querySelector(':scope > .tabs-group-header')?.classList.add('visible');
            dock.querySelector(':scope > .dock-body > .dock-tabs-bar')?.classList.add('ctrl-hidden');
        }
    }

    hideDockHeaders(dock) {
        dock.querySelector(':scope > .dock-header')?.classList.remove('visible');
        dock.querySelector(':scope > .tabs-group-header')?.classList.remove('visible');
        dock.querySelector(':scope > .dock-body > .dock-tabs-bar')?.classList.remove('ctrl-hidden');
    }

    hideAllDockHeaders() { this.docks.forEach(d => this.hideDockHeaders(d)); }

    /* ─────────────── CREATION ─────────────── */
    mkPanel(title, html) {
        return { id: `p-${++this.panelCounter}`, title, contentHTML: html };
    }

    createDock(parent = this.container, panels = null, tabsPos = 'top') {
        const num  = ++this.dockCounter;
        const dock = document.createElement('div');
        dock.className        = 'dock';
        dock.dataset.tabsPos  = tabsPos;
        dock.panelData        = panels ?? [this.mkPanel(`Panel ${num}`, `<div class="dock-card">Panel ${num}</div>`)];
        dock.activePanelIndex = 0;
        parent.appendChild(dock);
        this.docks.push(dock);
        this.rebuildDockUI(dock);
        return dock;
    }

    esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    rebuildDockUI(dock) {
        const panels  = dock.panelData;
        const ai      = Math.min(dock.activePanelIndex ?? 0, panels.length - 1);
        dock.activePanelIndex = ai;
        const hasTabs = panels.length > 1;

        /*
          TABS GROUP HEADER — controls the whole collection:
            ☰ Group   → drag entire dock (all panels) to reposition
            Ungroup   → split all tabs into individual docks
                        (horizontal row if top/bottom tabs, vertical column if left/right)
        */
        const groupHdr = hasTabs ? `
        <div class="tabs-group-header">
            <span class="tgh-label">${panels.length} tabs</span>
            <div class="tgh-controls">
                <button class="tgh-btn tgh-move"    title="Drag to reposition entire tab group">☰ Group</button>
                <button class="tgh-btn tgh-ungroup" title="Split all tabs into individual docks">⊟ Ungroup</button>
            </div>
        </div>` : '';

        /*
          DOCK HEADER — controls this specific tab/panel only:
            ☰ Move    → detach this tab and place it as an individual dock
            ⊞ Tab     → move this tab into another dock/tabs-group as a tab
            ✕         → remove this panel
        */
        const dock_header_title = panels[ai].title;

        const tabsBar = hasTabs ? `
        <div class="dock-tabs-bar">
            ${panels.map((p, i) => `
            <div class="dock-tab ${i===ai?'active':''}" data-pi="${i}">
                <span class="tab-title">${this.esc(p.title)}</span>
                <button class="tab-close" title="Close tab">×</button>
            </div>`).join('')}
        </div>` : '';

        const panelsHTML = panels.map((p, i) => `
        <div class="dock-panel ${i===ai?'active':''}" data-pi="${i}">
            ${p.contentHTML}
        </div>`).join('');

        dock.innerHTML = `
            ${groupHdr}
            <div class="dock-header">
                <span class="dock-title">${this.esc(dock_header_title)}</span>
                <div class="dock-controls">
                    <button class="dc-btn dh-move"   title="${hasTabs ? 'Drag: detach this tab as individual dock' : 'Drag: reposition this dock (center=swap)'}">☰</button>
                    <button class="dc-btn dh-tabify" title="Drag: move ${hasTabs ? 'this tab' : 'this dock'} as tab into another dock or tabs group">⊞</button>
                    <button class="dc-btn dh-remove" title="Remove ${hasTabs ? 'this tab' : 'this dock'}">✕</button>
                </div>
            </div>
            <div class="dock-body">
                ${tabsBar}
                <div class="dock-main">
                    <div class="dock-content">${panelsHTML}</div>
                </div>
            </div>
            <div class="drop-indicator top"></div>
            <div class="drop-indicator bottom"></div>
            <div class="drop-indicator left"></div>
            <div class="drop-indicator right"></div>
            <div class="drop-indicator center"></div>
        `;

        this.setupDockEvents(dock);
    }

    setupDockEvents(dock) {
        const hasTabs = dock.panelData.length > 1;

        dock.addEventListener('mouseenter', () => { this.hoveredDock = dock; });
        dock.addEventListener('mouseleave', () => {
            if (this.hoveredDock === dock) this.hoveredDock = null;
            this.hideDockHeaders(dock);
        });

        /* ── Tabs Group Header ── */
        // ☰ Group → move entire dock (all panels) — same as normal dock move
        dock.querySelector('.tgh-move')?.addEventListener('mousedown', (e) => {
            e.preventDefault();
            this.beginDrag(e, dock, 'move', null);
        });
        // Ungroup → split all tabs into individual docks
        dock.querySelector('.tgh-ungroup')?.addEventListener('click', () => {
            this.ungroupTabs(dock);
        });

        /* ── Dock Header ── */
        dock.querySelector('.dh-move')?.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (hasTabs) {
                // Detach this tab → place as individual dock (drop: top/bottom/left/right=insert, center=swap)
                this.beginDrag(e, dock, 'detach', dock.activePanelIndex);
            } else {
                // Normal whole-dock move
                this.beginDrag(e, dock, 'move', null);
            }
        });
        dock.querySelector('.dh-tabify')?.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (hasTabs) {
                // Move this tab into another dock/tabs-group as a tab
                this.beginDrag(e, dock, 'tab-move', dock.activePanelIndex);
            } else {
                // Merge whole dock as tab(s) into target
                this.beginDrag(e, dock, 'tabify', null);
            }
        });
        dock.querySelector('.dh-remove')?.addEventListener('click', () => {
            if (hasTabs) {
                this.removePanel(dock, dock.activePanelIndex);
            } else {
                this.removeDock(dock);
            }
        });

        /* ── Tab bar ── */
        dock.querySelectorAll('.dock-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                if (!e.target.classList.contains('tab-close'))
                    this.activatePanel(dock, +tab.dataset.pi);
            });
            tab.querySelector('.tab-close')?.addEventListener('click', (e) => {
                e.stopPropagation();
                this.removePanel(dock, +tab.dataset.pi);
            });
        });
    }

    /* ─────────────── PANEL MANAGEMENT ─────────────── */
    activatePanel(dock, index) {
        dock.activePanelIndex = index;
        dock.querySelectorAll('.dock-tab').forEach((t,i)   => t.classList.toggle('active', i===index));
        dock.querySelectorAll('.dock-panel').forEach((p,i) => p.classList.toggle('active', i===index));
        const titleEl = dock.querySelector(':scope > .dock-header .dock-title');
        if (titleEl) titleEl.textContent = dock.panelData[index].title;
    }

    removePanel(dock, index) {
        // Case 2: last tab → remove whole dock
        if (dock.panelData.length <= 1) { this.removeDock(dock); return; }
        dock.panelData.splice(index, 1);
        if (dock.activePanelIndex >= dock.panelData.length) dock.activePanelIndex = dock.panelData.length - 1;
        else if (dock.activePanelIndex > index)             dock.activePanelIndex--;
        // If panelData.length drops to 1, rebuildDockUI will automatically remove tabs bar (hasTabs=false)
        this.rebuildDockUI(dock);
    }

    /* ─────────────── UNGROUP ─────────────── */
    // Split all tabs into individual docks.
    // Horizontal tabs (top/bottom) → dock-row (side by side)
    // Vertical tabs (left/right)   → dock-column (stacked)
    ungroupTabs(dock) {
        if (dock.panelData.length <= 1) return;

        const tabsPos  = dock.dataset.tabsPos || 'top';
        const isH      = tabsPos === 'top' || tabsPos === 'bottom';
        const parent   = dock.parentElement;
        const flexVal  = dock.style.flex || '1';

        // Create wrapper
        const wrapper = document.createElement('div');
        wrapper.className  = isH ? 'dock-row' : 'dock-column';
        wrapper.style.flex = flexVal;

        // Create one new dock per panel
        dock.panelData.forEach(panel => {
            const newDock = document.createElement('div');
            newDock.className        = 'dock';
            newDock.dataset.tabsPos  = 'top';
            newDock.panelData        = [panel];
            newDock.activePanelIndex = 0;
            wrapper.appendChild(newDock);
            this.docks.push(newDock);
            this.rebuildDockUI(newDock);
        });

        // Replace original dock
        parent.insertBefore(wrapper, dock);
        dock.remove();
        this.docks = this.docks.filter(d => d !== dock);

        this.updateResizeHandles();
        this.updateConnectionPoints();
    }

    /* ─────────────── DRAG INITIATION ─────────────── */
    beginDrag(e, dock, mode, panelIndex) {
        this.dragMode        = mode;
        this.draggedDock     = dock;
        this.extractPanelIdx = panelIndex;
        dock.classList.add('dragging');
    }

    /* ─────────────── MOUSE EVENTS ─────────────── */
    onMouseMove(e) {
        if (this.resizing) { this.handleResize(e); return; }
        if (!this.dragMode) return;

        const els = document.elementsFromPoint(e.clientX, e.clientY);
        const tgt = els.find(el => el.classList.contains('dock') && el !== this.draggedDock);

        this.clearDropIndicators();

        if (tgt) {
            this.dropTarget = tgt;
            const r         = tgt.getBoundingClientRect();
            this.dropZone   = this.getDropZone(e.clientX - r.left, e.clientY - r.top, r.width, r.height);

            const isTabMode = this.dragMode === 'tabify' || this.dragMode === 'tab-move';
            this.showDropIndicator(tgt, this.dropZone, isTabMode);
        } else {
            this.dropTarget = null;
            this.dropZone   = null;
        }
    }

    onMouseUp() {
        if (this.resizing) {
            this.resizing.handle.classList.remove('resizing');
            this.resizing = null;
            this.updateConnectionPoints();
            return;
        }

        if (this.dragMode && this.dropTarget && this.dropZone) {
            if      (this.dragMode === 'move')     this.performMove();
            else if (this.dragMode === 'tabify')   this.performTabify();
            else if (this.dragMode === 'detach')   this.performDetach();
            else if (this.dragMode === 'tab-move') this.performTabMove();
        }

        if (this.draggedDock) {
            this.draggedDock.classList.remove('dragging');
            this.draggedDock = null;
        }
        this.clearDropIndicators();
        this.dragMode = null; this.dropTarget = null;
        this.dropZone = null; this.extractPanelIdx = null;
    }

    getDropZone(x, y, w, h) {
        const t = 0.33;
        if (Math.abs(x-w/2) < w*t/2 && Math.abs(y-h/2) < h*t/2) return 'center';
        if (y < h*t)     return 'top';
        if (y > h*(1-t)) return 'bottom';
        if (x < w*t)     return 'left';
        if (x > w*(1-t)) return 'right';
        return 'center';
    }

    showDropIndicator(dock, zone, isTabMode = false) {
        if (isTabMode) {
            ['top','bottom','left','right','center'].forEach(z => {
                const el = dock.querySelector(`:scope > .drop-indicator.${z}`);
                if (!el) return;
                el.classList.add('active', 'tabify-zone');
                if (z === zone) el.classList.add('active-zone');
            });
        } else {
            dock.querySelector(`:scope > .drop-indicator.${zone}`)?.classList.add('active');
        }
    }

    clearDropIndicators() {
        document.querySelectorAll('.drop-indicator').forEach(el =>
            el.classList.remove('active', 'tabify-zone', 'active-zone')
        );
    }

    /* ─────────────── DROP OPERATIONS ─────────────── */

    // MOVE: reposition entire dock. center=swap, others=insert adjacent.
    performMove() {
        const { draggedDock: src, dropTarget: tgt, dropZone: zone } = this;
        zone === 'center' ? this.swapDocks(src, tgt) : this.insertDock(src, tgt, zone);
        this.updateResizeHandles();
        this.updateConnectionPoints();
    }

    // TABIFY: merge entire dock (all its panels) into target as tabs.
    // Zone determines tab-bar direction.
    performTabify() {
        const { draggedDock: src, dropTarget: tgt, dropZone: zone } = this;
        const pos = zone === 'center' ? (tgt.dataset.tabsPos || 'top') : zone;
        this.mergeDockAsTab(src, tgt, pos);
        this.updateResizeHandles();
        this.updateConnectionPoints();
    }

    // DETACH: pull the active panel out of a tabbed dock and place it as an individual dock.
    performDetach() {
        const { draggedDock: src, dropTarget: tgt, dropZone: zone, extractPanelIdx: pi } = this;
        if (!src || !tgt || pi == null) return;

        const panel = src.panelData[pi];

        // Remove panel from source
        src.panelData.splice(pi, 1);
        if (src.activePanelIndex >= src.panelData.length) src.activePanelIndex = src.panelData.length - 1;
        else if (src.activePanelIndex > pi)               src.activePanelIndex--;

        // Build new standalone dock - NOT appended to DOM yet
        const newDock = document.createElement('div');
        newDock.className        = 'dock';
        newDock.dataset.tabsPos  = 'top';
        newDock.panelData        = [panel];
        newDock.activePanelIndex = 0;
        newDock.style.flex       = '1';
        this.docks.push(newDock);
        this.rebuildDockUI(newDock);

        // Rebuild or remove source BEFORE placing newDock, so cleanup doesn't disturb tgt
        if (src.panelData.length === 0) {
            const srcParent = src.parentElement;
            src.remove();
            this.docks = this.docks.filter(d => d !== src);
            this.cleanupEmptyContainer(srcParent);
        } else {
            this.rebuildDockUI(src);
        }

        // Place newDock directly next to tgt (center treated as right)
        this._placeDetachedDock(newDock, tgt, zone === 'center' ? 'right' : zone);

        this.updateResizeHandles();
        this.updateConnectionPoints();
    }

    // Insert a dock that is NOT yet in the DOM next to an existing target dock.
    _placeDetachedDock(newDock, target, zone) {
        const parent = target.parentElement;

        if (zone === 'top' || zone === 'bottom') {
            if (!parent.classList.contains('dock-column')) {
                const col = document.createElement('div');
                col.className  = 'dock-column';
                col.style.flex = target.style.flex || '1';
                parent.insertBefore(col, target);
                target.remove(); target.style.flex = '1';
                col.appendChild(target);
            }
            zone === 'top'
                ? target.parentElement.insertBefore(newDock, target)
                : (target.nextSibling
                    ? target.parentElement.insertBefore(newDock, target.nextSibling)
                    : target.parentElement.appendChild(newDock));
        } else {
            if (!parent.classList.contains('dock-row')) {
                const row = document.createElement('div');
                row.className  = 'dock-row';
                row.style.flex = target.style.flex || '1';
                parent.insertBefore(row, target);
                target.remove(); target.style.flex = '1';
                row.appendChild(target);
            }
            zone === 'left'
                ? target.parentElement.insertBefore(newDock, target)
                : (target.nextSibling
                    ? target.parentElement.insertBefore(newDock, target.nextSibling)
                    : target.parentElement.appendChild(newDock));
        }
    }

    // TAB-MOVE: move the active panel from a tabbed dock into another dock / tabs-group as a tab.
    // Zone determines tab-bar direction on target.
    performTabMove() {
        const { draggedDock: src, dropTarget: tgt, dropZone: zone, extractPanelIdx: pi } = this;
        if (!src || !tgt || src === tgt || pi == null) return;

        const panel  = src.panelData[pi];
        const tabPos = zone === 'center' ? (tgt.dataset.tabsPos || 'top') : zone;

        // Remove from source
        src.panelData.splice(pi, 1);
        if (src.activePanelIndex >= src.panelData.length) src.activePanelIndex = src.panelData.length - 1;
        else if (src.activePanelIndex > pi)               src.activePanelIndex--;

        // Add to target — Case 1: if target had 1 panel, tabs bar is now created automatically
        tgt.panelData.push(panel);
        tgt.dataset.tabsPos      = tabPos;
        tgt.activePanelIndex     = tgt.panelData.length - 1;

        if (src.panelData.length === 0) {
            const parent = src.parentElement;
            src.remove();
            this.docks = this.docks.filter(d => d !== src);
            this.cleanupEmptyContainer(parent);
        } else {
            this.rebuildDockUI(src);
        }

        this.rebuildDockUI(tgt);
        this.updateResizeHandles();
        this.updateConnectionPoints();
    }

    // Merge entire src dock (all panels) into tgt as tabs.
    // Case 1: if tgt had 1 panel, tabs bar created by rebuildDockUI (hasTabs becomes true).
    mergeDockAsTab(src, tgt, tabsPos) {
        const oldParent = src.parentElement;
        src.panelData.forEach(p => tgt.panelData.push(p));
        tgt.dataset.tabsPos  = tabsPos;
        tgt.activePanelIndex = 0;
        src.remove();
        this.docks = this.docks.filter(d => d !== src);
        this.cleanupEmptyContainer(oldParent);
        this.rebuildDockUI(tgt);
    }

    /* ─────────────── LAYOUT HELPERS ─────────────── */
    swapDocks(d1, d2) {
        const p1=d1.parentElement, p2=d2.parentElement, n1=d1.nextSibling, n2=d2.nextSibling;
        if      (n1===d2) { p1.insertBefore(d2, d1); }
        else if (n2===d1) { p2.insertBefore(d1, d2); }
        else {
            if (n1) p1.insertBefore(d2, n1); else p1.appendChild(d2);
            if (n2) p2.insertBefore(d1, n2); else p2.appendChild(d1);
        }
    }

    insertDock(dragged, target, zone) {
        const parent    = target.parentElement;
        const oldParent = dragged.parentElement;
        dragged.remove();
        dragged.style.flex = '1';
        this.cleanupEmptyContainer(oldParent);

        if (zone === 'top' || zone === 'bottom') {
            if (!parent.classList.contains('dock-column')) {
                const col = document.createElement('div');
                col.className  = 'dock-column';
                col.style.flex = target.style.flex || '1';
                parent.insertBefore(col, target);
                target.remove(); target.style.flex = '1';
                col.appendChild(target);
            }
            zone === 'top'
                ? target.parentElement.insertBefore(dragged, target)
                : (target.nextSibling
                    ? target.parentElement.insertBefore(dragged, target.nextSibling)
                    : target.parentElement.appendChild(dragged));
        } else {
            if (!parent.classList.contains('dock-row')) {
                const row = document.createElement('div');
                row.className  = 'dock-row';
                row.style.flex = target.style.flex || '1';
                parent.insertBefore(row, target);
                target.remove(); target.style.flex = '1';
                row.appendChild(target);
            }
            zone === 'left'
                ? target.parentElement.insertBefore(dragged, target)
                : (target.nextSibling
                    ? target.parentElement.insertBefore(dragged, target.nextSibling)
                    : target.parentElement.appendChild(dragged));
        }
    }

    cleanupEmptyContainer(container) {
        if (!container || container === this.container) return;
        const kids = Array.from(container.children).filter(c =>
            c.classList.contains('dock') || c.classList.contains('dock-row') || c.classList.contains('dock-column')
        );
        if (kids.length === 0) {
            const p = container.parentElement; container.remove(); this.cleanupEmptyContainer(p);
        } else if (kids.length === 1) {
            const child=kids[0], p=container.parentElement;
            child.style.flex = container.style.flex || '1';
            if (p) { p.insertBefore(child, container); container.remove(); this.cleanupEmptyContainer(p); }
        }
    }

    removeDock(dock) {
        if (this.docks.length <= 1) { alert('Cannot remove the last dock!'); return; }
        const parent = dock.parentElement;
        dock.remove();
        this.docks = this.docks.filter(d => d !== dock);
        this.cleanupEmptyContainer(parent);
        this.updateResizeHandles();
        this.updateConnectionPoints();
    }

    /* ─────────────── RESIZE ─────────────── */
    getMinSize(el, dim) {
        if (el.classList.contains('dock')) return dim === 'width' ? 200 : 150;
        const style = getComputedStyle(el);
        const isRow = style.flexDirection === 'row';
        const isAlong = (dim==='width'&&isRow)||(dim==='height'&&!isRow);
        let min=0, maxMin=0;
        for (const c of el.children) {
            if (c.classList.contains('resize-handle')) {
                if (isAlong) min += dim==='width' ? c.offsetWidth : c.offsetHeight;
            } else if (c.classList.contains('dock')||c.classList.contains('dock-row')||c.classList.contains('dock-column')) {
                const cm = this.getMinSize(c, dim);
                if (isAlong) min += cm; else maxMin = Math.max(maxMin, cm);
            }
        }
        return isAlong ? min : maxMin;
    }

    updateResizeHandles() {
        document.querySelectorAll('.resize-handle').forEach(h => h.remove());
        [this.container, ...document.querySelectorAll('.dock-row, .dock-column')].forEach(container => {
            const isRow = container === this.container || container.classList.contains('dock-row');
            const kids  = Array.from(container.children).filter(c =>
                c.classList.contains('dock')||c.classList.contains('dock-row')||c.classList.contains('dock-column')
            );
            kids.forEach((child, i) => {
                if (i < kids.length - 1) {
                    const h = document.createElement('div');
                    h.className = `resize-handle ${isRow ? 'vertical' : 'horizontal'}`;
                    child.appendChild(h);
                    h.addEventListener('mousedown', (e) => {
                        e.preventDefault(); e.stopPropagation();
                        this.startResize(e, child, kids[i+1], isRow);
                        h.classList.add('resizing');
                    });
                }
            });
        });
    }

    startResize(e, d1, d2, isH) {
        const dim = isH ? 'width' : 'height';
        this.resizing = {
            dock1:d1, dock2:d2, isHorizontal:isH,
            startPos:   isH ? e.clientX : e.clientY,
            startSize1: isH ? d1.offsetWidth  : d1.offsetHeight,
            startSize2: isH ? d2.offsetWidth  : d2.offsetHeight,
            minSize1:   this.getMinSize(d1, dim),
            minSize2:   this.getMinSize(d2, dim),
            handle: e.target
        };
    }

    handleResize(e) {
        if (!this.resizing) return;
        const {dock1,dock2,isHorizontal,startPos,startSize1,startSize2,minSize1,minSize2} = this.resizing;
        const delta = (isHorizontal ? e.clientX : e.clientY) - startPos;
        const s1=startSize1+delta, s2=startSize2-delta;
        if (s1>=minSize1 && s2>=minSize2) {
            dock1.style.flex=s1; dock2.style.flex=s2;
            this.updateConnectionPoints();
        }
    }

    /* ─────────────── CONNECTION POINTS ─────────────── */
    updateConnectionPoints() {
        document.querySelectorAll('.connection-point').forEach(cp => cp.remove());
        const handles = document.querySelectorAll('.resize-handle');
        const vList=[], hList=[];

        handles.forEach(h => {
            const r = h.getBoundingClientRect();
            h.classList.contains('vertical')
                ? vList.push({ handle:h, x:Math.round(r.left+r.width/2), y1:Math.round(r.top), y2:Math.round(r.bottom) })
                : hList.push({ handle:h, y:Math.round(r.top+r.height/2), x1:Math.round(r.left), x2:Math.round(r.right) });
        });

        const conns=new Map();
        const addC=(key,h1,h2)=>{ if(!conns.has(key))conns.set(key,new Set()); conns.get(key).add(h1);conns.get(key).add(h2); };

        const hGrp=new Map();
        hList.forEach(h=>{if(!hGrp.has(h.y))hGrp.set(h.y,[]);hGrp.get(h.y).push(h);});
        for(const g of hGrp.values()){
            g.sort((a,b)=>a.x1-b.x1);
            for(let i=0;i<g.length-1;i++)
                if(Math.abs(g[i].x2-g[i+1].x1)<=5)
                    addC(`${Math.round((g[i].x2+g[i+1].x1)/2)},${g[i].y}`,g[i].handle,g[i+1].handle);
        }

        const vGrp=new Map();
        vList.forEach(v=>{if(!vGrp.has(v.x))vGrp.set(v.x,[]);vGrp.get(v.x).push(v);});
        for(const g of vGrp.values()){
            g.sort((a,b)=>a.y1-b.y1);
            for(let i=0;i<g.length-1;i++)
                if(Math.abs(g[i].y2-g[i+1].y1)<=5)
                    addC(`${g[i].x},${Math.round((g[i].y2+g[i+1].y1)/2)}`,g[i].handle,g[i+1].handle);
        }

        vList.forEach(v=>hList.forEach(h=>{
            if(h.y>=v.y1&&h.y<=v.y2&&v.x>=h.x1&&v.x<=h.x2) addC(`${v.x},${h.y}`,v.handle,h.handle);
        }));
        hList.forEach(h=>vList.forEach(v=>{
            if(Math.abs(h.x1-v.x)<=3&&h.y>=v.y1&&h.y<=v.y2) addC(`${v.x},${h.y}`,h.handle,v.handle);
            if(Math.abs(h.x2-v.x)<=3&&h.y>=v.y1&&h.y<=v.y2) addC(`${v.x},${h.y}`,h.handle,v.handle);
        }));
        vList.forEach(v=>hList.forEach(h=>{
            if(Math.abs(v.y1-h.y)<=3&&v.x>=h.x1&&v.x<=h.x2) addC(`${v.x},${h.y}`,v.handle,h.handle);
            if(Math.abs(v.y2-h.y)<=3&&v.x>=h.x1&&v.x<=h.x2) addC(`${v.x},${h.y}`,v.handle,h.handle);
        }));

        conns.forEach((set,key)=>{
            if(set.size<2) return;
            const [x,y]=key.split(',').map(Number);
            const cp=document.createElement('div');
            cp.classList.add('connection-point');
            cp.style.left=`${x-5}px`; cp.style.top=`${y-5}px`;
            const arr=Array.from(set);
            const hasV=arr.some(h=>h.classList.contains('vertical'));
            const hasH=arr.some(h=>h.classList.contains('horizontal'));
            cp.style.cursor=hasV&&hasH?'move':hasV?'ew-resize':'ns-resize';
            document.body.appendChild(cp);
            cp.addEventListener('mousedown',(e)=>this.startConnectionDrag(e,arr));
        });
    }

    startConnectionDrag(e, handleList) {
        e.preventDefault();
        const startX=e.clientX, startY=e.clientY;
        let appliedX=0, appliedY=0;
        const verts =handleList.filter(h=>h.classList.contains('vertical'));
        const horizs=handleList.filter(h=>h.classList.contains('horizontal'));

        const onMove=(e)=>{
            const dx=e.clientX-startX-appliedX;
            const dy=e.clientY-startY-appliedY;

            if(verts.length){
                let minD=-Infinity,maxD=Infinity;
                verts.forEach(h=>{
                    const prev=h.parentElement,next=prev.nextElementSibling; if(!next)return;
                    minD=Math.max(minD,this.getMinSize(prev,'width')-prev.offsetWidth);
                    maxD=Math.min(maxD,next.offsetWidth-this.getMinSize(next,'width'));
                });
                const c=Math.max(minD,Math.min(dx,maxD));
                verts.forEach(h=>{
                    const prev=h.parentElement,next=prev.nextElementSibling; if(!next)return;
                    prev.style.flex=prev.offsetWidth+c; next.style.flex=next.offsetWidth-c;
                });
                appliedX+=c;
            }
            if(horizs.length){
                let minD=-Infinity,maxD=Infinity;
                horizs.forEach(h=>{
                    const prev=h.parentElement,next=prev.nextElementSibling; if(!next)return;
                    minD=Math.max(minD,this.getMinSize(prev,'height')-prev.offsetHeight);
                    maxD=Math.min(maxD,next.offsetHeight-this.getMinSize(next,'height'));
                });
                const c=Math.max(minD,Math.min(dy,maxD));
                horizs.forEach(h=>{
                    const prev=h.parentElement,next=prev.nextElementSibling; if(!next)return;
                    prev.style.flex=prev.offsetHeight+c; next.style.flex=next.offsetHeight-c;
                });
                appliedY+=c;
            }
            this.updateConnectionPoints();
        };

        const onUp=()=>{
            document.removeEventListener('mousemove',onMove);
            document.removeEventListener('mouseup',onUp);
            this.updateConnectionPoints();
        };

        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
    }
}

const dockingSystem = new DockingSystem('docking-container');
</script>
</body>
</html>
