<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoomable Board - Snap Preserves Angle</title>
    <style>
        /* --- GLOBAL RESET & THEME --- */
        :root {
            --bg-dark: #2b2b2b;
            --ui-panel: rgba(40, 40, 40, 0.95);
            --ui-border: rgba(255, 255, 255, 0.1);
            --ui-text: #e0e0e0;
            --accent-color: #4a90e2;
            --drop-zone-highlight: rgba(74, 144, 226, 0.3);
            --cb-check-1: #ccc;
            --cb-check-2: #fff;
            --symmetry-line-color: rgba(0, 255, 255, 0.8);
            --sym-handle-color: #f39c12;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--ui-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* --- COMPONENT CONTAINER --- */
        .canvas-board-container {
            position: relative; width: 100%; height: 100%;
            overflow: hidden; cursor: crosshair;
            background-color: #1e1e1e; 
        }

        /* --- CANVAS LAYERS --- */
        .canvas-board-transform-layer {
            position: absolute; top: 0; left: 0;
            transform-origin: 0 0;
            will-change: transform;
            background-image: 
                linear-gradient(45deg, var(--cb-check-1) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--cb-check-1) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--cb-check-1) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--cb-check-1) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: var(--cb-check-2);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        #artboard { display: block; background-color: #ffffff; position: absolute; top: 0; left: 0; z-index: 10; }
        #guide-canvas { display: block; background-color: transparent; position: absolute; top: 0; left: 0; z-index: 11; pointer-events: none; }

        /* --- DROP ZONES --- */
        .drop-zones-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 200; display: none;
        }
        .drop-zones-layer.active { display: flex; pointer-events: auto; }
        .drop-zone {
            position: absolute; background: transparent;
            transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; font-weight: bold; opacity: 0;
        }
        .drop-zones-layer.active .drop-zone { opacity: 1; }
        .drop-zone:hover { background: var(--drop-zone-highlight); }
        .dz-top { top:0; left:0; right:0; height: 100px; }
        .dz-bottom { bottom:0; left:0; right:0; height: 100px; }
        .dz-left { left:0; top:0; bottom:0; width: 100px; }
        .dz-right { right:0; top:0; bottom:0; width: 100px; }

        /* --- TOOLBAR STYLES --- */
        .toolbar {
            position: absolute;
            background: var(--ui-panel);
            backdrop-filter: blur(8px);
            border: 1px solid var(--ui-border);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
            user-select: none;
            display: flex;
            width: fit-content;
            height: fit-content;
            padding: 4px; 
        }

        .toolbar.hidden { display: none !important; }
        .toolbar.dragging { box-shadow: 0 12px 40px rgba(0,0,0,0.6); z-index: 101; opacity: 0.9; }
        .toolbar.sub-bar { z-index: 99; }

        /* --- HEADER & CONTENT --- */
        .toolbar-header { display: flex; gap: 4px; border-radius: 4px; }
        .sub-bar .toolbar-header { display: none; } 
        .toolbar:not(.sub-bar) .toolbar-header { cursor: grab; display: flex; gap: 4px; border-radius: 4px; }
        .toolbar:not(.sub-bar) .toolbar-header:active { cursor: grabbing; }
        .toolbar-content { display: flex; gap: 4px; }

        /* --- ORIENTATION LOGIC --- */
        .toolbar.orientation-v { flex-direction: column; }
        .toolbar.orientation-v .toolbar-header {
            flex-direction: column; border-bottom: 1px solid var(--ui-border); border-right: none;
            padding-bottom: 4px; margin-bottom: 4px; width: 100%;
        }
        .toolbar.orientation-v .toolbar-content { flex-direction: column; }
        .toolbar.orientation-v .separator { width: 100%; height: 1px; margin: 4px 0; }

        .toolbar.orientation-h { flex-direction: row; }
        .toolbar.orientation-h .toolbar-header {
            flex-direction: row; border-right: 1px solid var(--ui-border); border-bottom: none;
            padding-right: 4px; margin-right: 4px; height: 100%;
        }
        .toolbar.orientation-h .toolbar-content { flex-direction: row; }
        .toolbar.orientation-h .separator { height: 100%; width: 1px; margin: 0 4px; }

        /* --- BUTTONS --- */
        .btn-icon {
            background: transparent; border: none; color: var(--ui-text);
            width: 32px; height: 32px;
            border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .btn-icon:hover { background: rgba(255,255, 255, 0.1); color: #fff; }
        .btn-icon.active { background: var(--accent-color); color: #fff; }
        .btn-icon svg { width: 18px; height: 18px; fill: currentColor; }
        .handle-icon { opacity: 0.6; }
        .handle-icon:hover { opacity: 1; }

        /* --- CONTROLS --- */
        .color-swatch {
            width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff;
            overflow: hidden; position: relative; cursor: pointer; flex-shrink: 0;
        }
        input[type="color"] { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; border: none; padding: 0; cursor: pointer; }

        .brush-control { display: flex; align-items: center; justify-content: center; }
        input[type=range].slider-input {
            -webkit-appearance: slider-vertical; width: 4px; height: 80px;
            background: transparent; accent-color: var(--ui-text);
        }
        .orientation-h .brush-control { flex-direction: row; }
        .orientation-h input[type=range].slider-input {
            -webkit-appearance: auto; width: 100px; height: 4px; background: var(--ui-text); border-radius: 2px;
        }

        /* Symmetry Specific Controls */
        .sym-control-group {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 10px; color: #aaa;
            position: relative;
        }
        .sym-control-row { 
            display: flex; align-items: center; gap: 6px; 
            width: 100%; justify-content: space-between;
            padding: 0 2px;
        }
        .toolbar.orientation-v .sym-control-row { flex-direction: column; margin-bottom: 2px; }

        .sym-val {
            font-family: monospace;
            font-size: 10px;
            color: var(--accent-color);
            min-width: 20px;
            text-align: center;
        }

        .mini-reset-btn {
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
            padding: 2px;
        }
        .mini-reset-btn:hover { color: #fff; }

        .sym-btn {
            width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--ui-border);
            background: #333; color: #fff; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 12px;
        }
        .sym-btn.active { background: var(--accent-color); border-color: var(--accent-color); }
        .sym-btn-group { display: flex; gap: 2px; }
        .toolbar.orientation-v .sym-btn-group { flex-direction: column; }

        /* --- SUB-BAR SPECIFIC OVERRIDES --- */
        .sub-bar.orientation-v input[type=range].slider-input {
            -webkit-appearance: slider-vertical !important;
            width: 4px !important;
            height: 80px !important;
            background: transparent !important;
            accent-color: var(--ui-text);
        }
        .sub-bar.orientation-h input[type=range].slider-input {
            -webkit-appearance: auto !important;
            width: 100px !important;
            height: 4px !important;
            background: var(--ui-text) !important;
            border-radius: 2px;
        }

        /* --- STATUS --- */
        .status-pill {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--ui-panel); padding: 6px 14px; border-radius: 20px;
            font-size: 12px; color: #aaa; border: 1px solid var(--ui-border);
            pointer-events: none; z-index: 50;
        }
        header {
            background: #111; height: 30px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; color: #555; border-bottom: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>DRAG HEADER TO MOVE FREE • CLICK ANCHOR TO DOCK</header>

    <main id="app-container" style="flex: 1; position: relative;">
        <div class="canvas-board-container" id="drawing-board">
            
            <div class="canvas-board-transform-layer">
                <canvas id="guide-canvas" width="2000" height="2000"></canvas>
                <canvas id="artboard" class="canvas-board" width="2000" height="2000"></canvas>
            </div>

            <div class="drop-zones-layer" id="drop-zones">
                <div class="drop-zone dz-top" data-side="top">TOP</div>
                <div class="drop-zone dz-right" data-side="right">RIGHT</div>
                <div class="drop-zone dz-bottom" data-side="bottom">BOTTOM</div>
                <div class="drop-zone dz-left" data-side="left">LEFT</div>
            </div>

            <!-- TOOLBAR 1: BRUSHES -->
            <div class="toolbar orientation-v" id="tb-brush" style="top: 50%; left: 20px; transform: translateY(-50%);" data-docked-side="left">
                <div class="toolbar-header">
                    <div class="btn-icon handle-icon" title="Drag to Move">
                        <svg viewBox="0 0 24 24"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    </div>
                    <div class="btn-icon" id="tb-brush-dock-btn" title="Dock Mode">

                    </div>
                </div>
                <div class="toolbar-content">
                    <button class="btn-icon active" data-tool="pen" title="Pen">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </button>
                    <button class="btn-icon" data-tool="eraser" title="Eraser">
                        <svg viewBox="0 0 24 24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L9.17 24.17c.79.78 2.05.78 2.83 0l11.03-11.03c.79-.79.79-2.05 0-2.83l-6.58-6.59c-.39-.39-.91-.59-1.42-.59zm-6.14 13l-4-4 8.29-8.29 4 4-8.29 8.29z"/></svg>
                    </button>
                    <div class="separator"></div>
                    <div class="color-swatch"><input type="color" id="color-picker" value="#000000"></div>
                    <div class="separator"></div>
                    <div class="brush-control">
                        <input type="range" id="brush-size" class="slider-input" min="1" max="100" value="5">
                    </div>
                </div>
            </div>

            <!-- TOOLBAR 2: BOARD TOOLS (MAIN) -->
            <div class="toolbar orientation-h" id="tb-board" style="top: 20px; left: 50%; transform: translateX(-50%);" data-docked-side="top">
                <div class="toolbar-header">
                    <div class="btn-icon handle-icon" title="Drag to Move">
                        <svg viewBox="0 0 24 24"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    </div>
                    <div class="btn-icon" id="tb-board-dock-btn" title="Dock Mode">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    </div>
                </div>
                <div class="toolbar-content">
                    <button class="btn-icon" data-tool="move" title="Move">
                        <svg viewBox="0 0 24 24"><path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"/></svg>
                    </button>
                    <div class="separator"></div>
                    <button class="btn-icon" onclick="zoomAction(-1)">-</button>
                    <button class="btn-icon" id="zoom-reset">100%</button>
                    <button class="btn-icon" onclick="zoomAction(1)">+</button>
                    <div class="separator"></div>
                    <button class="btn-icon" id="sym-toggle-btn" title="Symmetry Tool" style="color: #f39c12">
                        <svg viewBox="0 0 24 24"><path d="M12 2L1 12h3v9h7v-6h2v6h7v-9h3L12 2zm0 2.84L19.5 11h-1.5v7h-3v-6h-6v6h-3v-7h-1.5L12 4.84zM10 14c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm4 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                    </button>
                </div>
            </div>

            <!-- TOOLBAR 3: SYMMETRY (SUB-BAR) -->
            <div class="toolbar orientation-h sub-bar hidden" id="tb-symmetry" data-docked-side="free">
                <div class="toolbar-header"></div> 
                
                <div class="toolbar-content">
                    <div class="separator"></div>
                    <div class="sym-control-group">
                        <div class="sym-btn-group">
                            <button class="sym-btn active" id="sym-type-ref" title="Reflection">REF</button>
                            <button class="sym-btn" id="sym-type-rep" title="Repeat">REP</button>
                        </div>
                    </div>
                    <div class="separator"></div>
                    <div class="sym-control-group">
                        <div class="sym-control-row">
                            <span>LINES</span>
                            <span id="val-lines" class="sym-val">6</span>
                        </div>
                        <input type="range" id="sym-lines" class="slider-input" min="1" max="12" value="6">
                    </div>
                    <div class="separator"></div>
                    <div class="sym-control-group">
                        <div class="sym-control-row">
                            <span>ROT</span>
                            <span id="val-angle" class="sym-val">0</span>
                            <button class="mini-reset-btn" id="sym-reset-angle-btn" title="Reset Rotation">↺</button>
                        </div>
                        <input type="range" id="sym-angle" class="slider-input" min="0" max="360" value="0">
                    </div>
                    <div class="separator"></div>
                    <div class="sym-control-group">
                        <div class="sym-control-row">
                            <span>OFF</span>
                            <span id="val-offset" class="sym-val">0</span>
                        </div>
                        <input type="range" id="sym-offset" class="slider-input" min="-200" max="200" value="0">
                    </div>
                    <div class="separator"></div>
                    <button class="btn-icon" id="sym-snap-btn" title="Snap Center to Canvas Center" style="color: #e74c3c">
                        <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8.94-3c-.46-4.17-3.77-7.48-7.94-7.94V1h-4v2.06C6.83 3.52 3.52 6.83 3.06 11H1v4h2.06c.46 4.17 3.77 7.48 7.94 7.94V25h4v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-4h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
                    </button>
                </div>
            </div>

            <div class="status-pill" id="status-coords">0, 0 px</div>
        </div>
    </main>

    <script>
        /* --- SYMMETRY ENGINE --- */
        const SymmetryEngine = {
            active: false,
            type: 'reflection', 
            lines: 6,
            angle: 0, 
            offset: 0,
            // Cartesian coordinates (Source of Truth for Canvas Interaction)
            cx: 1000,
            cy: 1000,
            
            init(w, h) {
                // Reset Position to Center
                this.cx = w / 2;
                this.cy = h / 2;
                this.offset = 0; // Distance to center is now 0
                
                // IMPORTANT: Do NOT reset this.angle to preserve user's rotation
                // this.angle = 0; 
            },

            toggle() {
                this.active = !this.active;
                const btn = document.getElementById('sym-toggle-btn');
                const subBar = document.getElementById('tb-symmetry');
                if(this.active) {
                    btn.classList.add('active');
                    subBar.classList.remove('hidden');
                    if(toolbarManager) toolbarManager.syncSubBar();
                } else {
                    btn.classList.remove('active');
                    subBar.classList.add('hidden');
                }
                if(CanvasBoardInstance) CanvasBoardInstance.drawGuides();
            },

            setType(t) {
                this.type = t;
                document.getElementById('sym-type-ref').classList.toggle('active', t === 'reflection');
                document.getElementById('sym-type-rep').classList.toggle('active', t === 'repeat');
                if(CanvasBoardInstance) CanvasBoardInstance.drawGuides();
            },

            // --- SLIDER INPUTS (Polar Control) ---
            
            updateFromAngle(newAngle) {
                this.angle = parseInt(newAngle);
                const rad = this.angle * Math.PI / 180;
                const w = CanvasBoardInstance.canvas.width;
                const h = CanvasBoardInstance.canvas.height;
                
                // Recalculate cx, cy to maintain offset distance (Standard Polar Slider Behavior)
                this.cx = w/2 + this.offset * Math.cos(rad);
                this.cy = h/2 + this.offset * Math.sin(rad);

                document.getElementById('val-angle').innerText = this.angle;
                if(CanvasBoardInstance) CanvasBoardInstance.drawGuides();
            },

            updateFromOffset(newOffset) {
                this.offset = parseInt(newOffset);
                const rad = this.angle * Math.PI / 180;
                const w = CanvasBoardInstance.canvas.width;
                const h = CanvasBoardInstance.canvas.height;
                
                // Recalculate cx, cy along the angle ray
                this.cx = w/2 + this.offset * Math.cos(rad);
                this.cy = h/2 + this.offset * Math.sin(rad);
                
                document.getElementById('val-offset').innerText = this.offset;
                if(CanvasBoardInstance) CanvasBoardInstance.drawGuides();
            },

            // --- CANVAS INTERACTION (Cartesian Control) ---

            // Called by White Handle Drag: Updates Position ONLY
            setCartesian(x, y) {
                this.cx = x;
                this.cy = y;
                
                // Recalculate offset (Distance from center)
                const w = CanvasBoardInstance.canvas.width;
                const h = CanvasBoardInstance.canvas.height;
                const dx = this.cx - w/2;
                const dy = this.cy - h/2;
                this.offset = Math.sqrt(dx*dx + dy*dy);
                
                // Update Offset Slider, but DO NOT update Angle slider or logic
                document.getElementById('sym-offset').value = Math.round(this.offset);
                document.getElementById('val-offset').innerText = Math.round(this.offset);
                
                // IMPORTANT: We do NOT update this.angle. This allows Orange Handle to have its own responsibility.
                
                if(CanvasBoardInstance) CanvasBoardInstance.drawGuides();
            },

            // Called by Orange Handle Drag: Updates Angle ONLY
            setRotation(newAngleDeg) {
                this.angle = newAngleDeg;
                
                // Update Angle Slider. Do NOT touch cx, cy.
                document.getElementById('sym-angle').value = Math.round(this.angle);
                document.getElementById('val-angle').innerText = Math.round(this.angle);
                
                // We DO need to update the Offset Slider display because 
                // dragging Orange handle shouldn't change distance, but the slider UI
                // relies on our internal state.
                // We can just refresh the offset value to current offset (it shouldn't change).
                document.getElementById('sym-offset').value = Math.round(this.offset);
                document.getElementById('val-offset').innerText = Math.round(this.offset);

                if(CanvasBoardInstance) CanvasBoardInstance.drawGuides();
            },

            getTransformedPoints(x, y, w, h) {
                if (!this.active) return [{x, y}];
                const points = [];
                
                let tx = x - this.cx;
                let ty = y - this.cy;

                const userAngleRad = -this.angle * Math.PI / 180;
                let rx = tx * Math.cos(userAngleRad) - ty * Math.sin(userAngleRad);
                let ry = tx * Math.sin(userAngleRad) + ty * Math.cos(userAngleRad);

                let r = Math.sqrt(rx*rx + ry*ry);
                let theta = Math.atan2(ry, rx);

                const segmentAngle = (2 * Math.PI) / this.lines;

                for (let i = 0; i < this.lines; i++) {
                    let currentBaseAngle = i * segmentAngle;
                    let finalTheta;

                    if (this.type === 'reflection') {
                        if (i % 2 === 0) {
                            finalTheta = currentBaseAngle + theta;
                        } else {
                            finalTheta = currentBaseAngle - theta;
                        }
                    } else {
                        finalTheta = currentBaseAngle + theta;
                    }

                    let fx = r * Math.cos(finalTheta);
                    let fy = Math.sin(finalTheta);

                    let unrotateRad = -userAngleRad; 
                    let ufx = fx * Math.cos(unrotateRad) - fy * Math.sin(unrotateRad);
                    let ufy = fx * Math.sin(unrotateRad) + fy * Math.cos(unrotateRad);

                    points.push({
                        x: ufx + this.cx,
                        y: ufy + this.cy
                    });
                }
                return points;
            }
        };

        /* --- CANVAS BOARD LOGIC --- */
        class CanvasBoard {
            constructor(containerId, canvasId) {
                this.container = document.getElementById(containerId);
                this.canvas = document.getElementById(canvasId);
                this.guideCanvas = document.getElementById('guide-canvas');
                this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
                this.guideCtx = this.guideCanvas.getContext('2d');
                this.statusText = document.getElementById('status-coords');
                this.zoomBtn = document.getElementById('zoom-reset');

                this.isDrawing = false; this.isPanning = false;
                this.scale = 1; this.panX = 0; this.panY = 0;
                this.currentTool = 'pen';
                this.brushSize = 5; this.brushColor = '#000000';
                this.minScale = 0.1; this.maxScale = 20;
                this.isSpacePressed = false;
                this.lastPoints = []; 
                
                this.guideInteraction = 'none'; 
                this.handleRadius = 10; 

                this.init();
            }

            init() {
                this.setupCanvas();
                this.centerView();
                SymmetryEngine.init(this.canvas.width, this.canvas.height);
                this.attachEvents();
            }

            setupCanvas() {
                this.ctx.lineCap = 'round'; this.ctx.lineJoin = 'round';
                this.ctx.fillStyle = "#ffffff";
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }
            
            setTool(toolName) {
                this.currentTool = toolName;
                this.container.style.cursor = toolName === 'move' ? 'grab' : 'crosshair';
                document.querySelectorAll('[data-tool]').forEach(btn => {
                    if(btn.dataset.tool === toolName) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            }

            setColor(hex) {
                this.brushColor = hex;
                if(this.currentTool === 'eraser') this.setTool('pen');
            }

            centerView() {
                const rect = this.container.getBoundingClientRect();
                this.panX = (rect.width - this.canvas.width) / 2;
                this.panY = (rect.height - this.canvas.height) / 2;
                this.scale = 1;
                this.updateTransform();
            }

            getCanvasCoordinates(clientX, clientY) {
                const rect = this.container.getBoundingClientRect();
                const x = (clientX - rect.left - this.panX) / this.scale;
                const y = (clientY - rect.top - this.panY) / this.scale;
                return { x, y };
            }

            updateTransform() {
                const layer = this.container.querySelector('.canvas-board-transform-layer');
                layer.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.scale})`;
                this.zoomBtn.innerText = `${Math.round(this.scale * 100)}%`;
            }

            zoom(delta, mouseX, mouseY) {
                const zoomSensitivity = 0.1;
                const newScale = this.scale + (delta * zoomSensitivity * this.scale);
                if (newScale < this.minScale || newScale > this.maxScale) return;

                const rect = this.container.getBoundingClientRect();
                const mx = mouseX - rect.left; const my = mouseY - rect.top;
                const xs = (mx - this.panX) / this.scale; const ys = (my - this.panY) / this.scale;
                
                this.panX = mx - xs * newScale; this.panY = my - ys * newScale;
                this.scale = newScale;
                this.updateTransform();
                this.drawGuides(); 
            }

            drawGuides() {
                const ctx = this.guideCtx;
                const w = this.canvas.width; const h = this.canvas.height;
                ctx.clearRect(0, 0, w, h);
                
                if(!SymmetryEngine.active) return;

                const cx = SymmetryEngine.cx;
                const cy = SymmetryEngine.cy;
                const len = Math.max(w, h) * 1.5; 
                const step = 360 / SymmetryEngine.lines;
                const angleRad = SymmetryEngine.angle * Math.PI / 180;

                ctx.beginPath();
                ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--symmetry-line-color');
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 1 / this.scale; 

                for(let i=0; i<SymmetryEngine.lines; i++) {
                    const theta = angleRad + i * (step * Math.PI / 180);
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(theta)*len, cy + Math.sin(theta)*len);
                }
                ctx.stroke();

                // Center Handle
                const handleRad = this.handleRadius / this.scale;
                ctx.beginPath();
                ctx.arc(cx, cy, handleRad, 0, Math.PI*2);
                ctx.fillStyle = "#fff";
                ctx.fill();
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 1 / this.scale;
                ctx.setLineDash([]);
                ctx.stroke();

                // Rotation Handle
                const rotDist = 150;
                const rx = cx + Math.cos(angleRad) * rotDist;
                const ry = cy + Math.sin(angleRad) * rotDist;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(rx, ry);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                ctx.lineWidth = 1 / this.scale;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(rx, ry, handleRad, 0, Math.PI*2);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--sym-handle-color');
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1 / this.scale;
                ctx.stroke();
            }

            attachEvents() {
                this.container.addEventListener('mousedown', e => {
                    if (e.target.closest('.toolbar') || e.target.closest('.drop-zone')) return;
                    this.handleStart(e);
                });
                
                window.addEventListener('mousemove', e => this.handleMove(e));
                window.addEventListener('mouseup', () => this.handleEnd());
                this.container.addEventListener('wheel', e => { 
                    e.preventDefault(); 
                    this.zoom(-Math.sign(e.deltaY), e.clientX, e.clientY); 
                }, { passive: false });

                window.addEventListener('keydown', e => { 
                    if(e.code === 'Space') this.isSpacePressed = true; 
                    this.container.style.cursor = this.isSpacePressed ? 'grab' : (this.currentTool === 'move' ? 'grab' : 'crosshair');
                });
                window.addEventListener('keyup', e => { 
                    if(e.code === 'Space') this.isSpacePressed = false; 
                    this.container.style.cursor = this.currentTool === 'move' ? 'grab' : 'crosshair';
                });
                this.container.addEventListener('contextmenu', e => e.preventDefault());
            }

            handleStart(e) {
                if (e.button === 1 || (e.button === 0 && this.isSpacePressed) || this.currentTool === 'move') {
                    this.isPanning = true;
                    this.lastX = e.clientX; this.lastY = e.clientY;
                    this.container.style.cursor = 'grabbing';
                    return;
                }
                
                if (SymmetryEngine.active) {
                    const c = this.getCanvasCoordinates(e.clientX, e.clientY);
                    const w = this.canvas.width; const h = this.canvas.height;
                    
                    const cx = SymmetryEngine.cx;
                    const cy = SymmetryEngine.cy;
                    const angleRad = SymmetryEngine.angle * Math.PI / 180;
                    
                    const hitRadius = (this.handleRadius + 5) / this.scale;

                    const distCenter = Math.hypot(c.x - cx, c.y - cy);
                    if(distCenter <= hitRadius) {
                        this.guideInteraction = 'move';
                        this.container.style.cursor = 'move';
                        return;
                    }

                    const rotDist = 150;
                    const rx = cx + Math.cos(angleRad) * rotDist;
                    const ry = cy + Math.sin(angleRad) * rotDist;
                    const distRot = Math.hypot(c.x - rx, c.y - ry);
                    
                    if(distRot <= hitRadius) {
                        this.guideInteraction = 'rotate';
                        this.container.style.cursor = 'grabbing'; 
                        return;
                    }
                }

                if (e.button === 0) {
                    this.isDrawing = true;
                    const c = this.getCanvasCoordinates(e.clientX, e.clientY);
                    const points = SymmetryEngine.getTransformedPoints(c.x, c.y, this.canvas.width, this.canvas.height);
                    this.lastPoints = points;
                    this.drawAll(points, false);
                }
            }

            handleMove(e) {
                const rect = this.container.getBoundingClientRect();
                if (this.isPanning) {
                    this.panX += e.clientX - this.lastX;
                    this.panY += e.clientY - this.lastY;
                    this.lastX = e.clientX; this.lastY = e.clientY;
                    this.updateTransform();
                } else if (this.guideInteraction !== 'none') {
                    const c = this.getCanvasCoordinates(e.clientX, e.clientY);
                    const w = this.canvas.width; const h = this.canvas.height;

                    if (this.guideInteraction === 'move') {
                        // White Handle Drag: Update Position ONLY
                        SymmetryEngine.setCartesian(c.x, c.y);
                    } 
                    else if (this.guideInteraction === 'rotate') {
                        // Orange Handle Drag: Update Rotation ONLY
                        const dx = c.x - SymmetryEngine.cx;
                        const dy = c.y - SymmetryEngine.cy;
                        let newAngleDeg = Math.atan2(dy, dx) * 180 / Math.PI;
                        if(newAngleDeg < 0) newAngleDeg += 360;
                        
                        SymmetryEngine.setRotation(newAngleDeg);
                    }
                } else if (this.isDrawing) {
                    const c = this.getCanvasCoordinates(e.clientX, e.clientY);
                    const points = SymmetryEngine.getTransformedPoints(c.x, c.y, this.canvas.width, this.canvas.height);
                    this.drawAll(points, true);
                    this.lastPoints = points;
                }
                
                if(rect.left <= e.clientX && e.clientX <= rect.right && rect.top <= e.clientY && e.clientY <= rect.bottom) {
                    const c = this.getCanvasCoordinates(e.clientX, e.clientY);
                    this.statusText.innerText = `${Math.round(c.x)}, ${Math.round(c.y)} px`;
                }
            }

            handleEnd() {
                this.isDrawing = false; this.isPanning = false;
                this.guideInteraction = 'none';
                this.container.style.cursor = this.currentTool === 'move' ? 'grab' : 'crosshair';
                this.lastPoints = [];
                this.drawGuides(); 
            }

            drawAll(points, isMoving) {
                this.ctx.beginPath();
                this.ctx.lineWidth = this.brushSize;
                
                if (this.currentTool === 'eraser') {
                    this.ctx.globalCompositeOperation = 'destination-out';
                    this.ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else {
                    this.ctx.globalCompositeOperation = 'source-over';
                    this.ctx.strokeStyle = this.brushColor;
                }

                if (isMoving && this.lastPoints.length === points.length) {
                    for(let i=0; i<points.length; i++) {
                        const p = points[i]; const lp = this.lastPoints[i];
                        this.ctx.moveTo(lp.x, lp.y); this.ctx.lineTo(p.x, p.y);
                    }
                    this.ctx.stroke();
                } else {
                    for(let p of points) {
                        this.ctx.beginPath(); 
                        this.ctx.arc(p.x, p.y, this.brushSize / 2, 0, Math.PI * 2); 
                        this.ctx.fillStyle = this.ctx.strokeStyle;
                        this.ctx.fill();
                    }
                }
                this.ctx.globalCompositeOperation = 'source-over';
            }
        }

        /* --- TOOLBAR MANAGER LOGIC --- */
        class ToolbarManager {
            constructor() {
                this.toolbars = [
                    { id: 'tb-brush', el: document.getElementById('tb-brush'), dockBtn: document.getElementById('tb-brush-dock-btn') },
                    { id: 'tb-board', el: document.getElementById('tb-board'), dockBtn: document.getElementById('tb-board-dock-btn'), subBarId: 'tb-symmetry' },
                    { id: 'tb-symmetry', el: document.getElementById('tb-symmetry'), dockBtn: null }
                ];
                
                this.dropZonesLayer = document.getElementById('drop-zones');
                this.zones = document.querySelectorAll('.drop-zone');
                
                this.activeToolbar = null;
                this.dragState = { isDragging: false, offsetX: 0, offsetY: 0 };
                this.gap = 10; 

                this.init();
            }

            init() {
                this.toolbars.forEach(tb => {
                    if(tb.dockBtn) {
                        tb.dockBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.activateInsertMode(tb);
                        });
                    }
                    const header = tb.el.querySelector('.toolbar-header');
                    if(window.getComputedStyle(header).display !== 'none') {
                        header.addEventListener('mousedown', (e) => {
                            e.stopPropagation();
                            this.startDrag(tb, e);
                        });
                    }
                });

                window.addEventListener('mousemove', (e) => {
                    if (this.dragState.isDragging && this.activeToolbar) this.drag(e);
                });
                window.addEventListener('mouseup', () => {
                    if (this.dragState.isDragging) this.stopDrag();
                });
                this.zones.forEach(zone => {
                    zone.addEventListener('click', () => {
                        const side = zone.dataset.side;
                        this.dockToSide(side);
                    });
                });
            }

            activateInsertMode(toolbarObj) {
                this.activeToolbar = toolbarObj;
                this.dropZonesLayer.classList.add('active');
            }
            deactivateInsertMode() {
                this.dropZonesLayer.classList.remove('active');
                this.activeToolbar = null;
            }

            startDrag(tb, e) {
                this.activeToolbar = tb;
                this.dragState.isDragging = true;
                const rect = tb.el.getBoundingClientRect();
                this.dragState.offsetX = e.clientX - rect.left;
                this.dragState.offsetY = e.clientY - rect.top;
                tb.el.classList.add('dragging');
                tb.el.style.transform = 'none';
                const containerRect = document.getElementById('drawing-board').getBoundingClientRect();
                tb.el.style.left = `${rect.left - containerRect.left}px`;
                tb.el.style.top = `${rect.top - containerRect.top}px`;
                delete tb.el.dataset.dockedSide;
                tb.el.style.right = 'auto'; tb.el.style.bottom = 'auto';
            }

            drag(e) {
                if (!this.activeToolbar) return;
                const tb = this.activeToolbar;
                const container = document.getElementById('drawing-board');
                const containerRect = container.getBoundingClientRect();
                tb.el.style.left = `${e.clientX - containerRect.left - this.dragState.offsetX}px`;
                tb.el.style.top = `${e.clientY - containerRect.top - this.dragState.offsetY}px`;

                const tbRect = tb.el.getBoundingClientRect();
                const centerX = tbRect.left + tbRect.width / 2;
                const centerY = tbRect.top + tbRect.height / 2;
                const distTop = centerY; const distBottom = window.innerHeight - centerY;
                const distLeft = centerX; const distRight = window.innerWidth - centerX;
                const min = Math.min(distTop, distBottom, distLeft, distRight);
                
                if (min === distTop || min === distBottom) this.setOrientation(tb, 'h');
                else this.setOrientation(tb, 'v');

                if (tb.subBarId) {
                    this.syncSubBar(tb);
                }
            }

            stopDrag() {
                if (this.activeToolbar) this.activeToolbar.el.classList.remove('dragging');
                this.dragState.isDragging = false;
                this.activeToolbar = null;
            }

            dockToSide(targetSide) {
                if (!this.activeToolbar) return;
                const activeTB = this.activeToolbar;
                const occupant = this.getToolbarAt(targetSide);
                const sourceSide = activeTB.el.dataset.dockedSide || 'free';
                let sourceCoords = null;
                
                if (sourceSide === 'free') {
                    const tbRect = activeTB.el.getBoundingClientRect();
                    const contRect = document.getElementById('drawing-board').getBoundingClientRect();
                    sourceCoords = { x: tbRect.left - contRect.left, y: tbRect.top - contRect.top };
                }

                if (occupant) {
                    if (sourceSide === 'free') {
                        this.applyFreePosition(occupant, sourceCoords.x, sourceCoords.y);
                    } else {
                        this.applyDockPosition(occupant, sourceSide);
                    }
                    if (occupant.subBarId) {
                        this.syncSubBar(occupant);
                    }
                }

                this.applyDockPosition(activeTB, targetSide);
                this.syncSubBar(activeTB); 
                this.deactivateInsertMode();
            }

            getToolbarAt(side) {
                return this.toolbars.find(t => t.el.dataset.dockedSide === side);
            }

            setOrientation(tb, type) {
                if (type === 'v') {
                    tb.el.classList.add('orientation-v');
                    tb.el.classList.remove('orientation-h');
                } else {
                    tb.el.classList.add('orientation-h');
                    tb.el.classList.remove('orientation-v');
                }
            }

            applyDockPosition(tb, side) {
                const el = tb.el;
                const offset = 20;
                el.style.transition = 'none';
                el.style.transform = 'none';
                if (side === 'free') {
                    el.style.top = '50%'; el.style.left = '50%';
                    el.style.transform = 'translate(-50%, -50%)';
                    delete el.dataset.dockedSide;
                    return;
                }
                el.dataset.dockedSide = side;
                if (side === 'left') {
                    this.setOrientation(tb, 'v');
                    el.style.left = `${offset}px`; el.style.right = 'auto';
                    el.style.top = '50%'; el.style.bottom = 'auto';
                    el.style.transform = 'translateY(-50%)';
                } else if (side === 'right') {
                    this.setOrientation(tb, 'v');
                    el.style.right = `${offset}px`; el.style.left = 'auto';
                    el.style.top = '50%'; el.style.bottom = 'auto';
                    el.style.transform = 'translateY(-50%)';
                } else if (side === 'top') {
                    this.setOrientation(tb, 'h');
                    el.style.top = `${offset}px`; el.style.bottom = 'auto';
                    el.style.left = '50%'; el.style.right = 'auto';
                    el.style.transform = 'translateX(-50%)';
                } else if (side === 'bottom') {
                    this.setOrientation(tb, 'h');
                    el.style.bottom = `${offset}px`; el.style.top = 'auto';
                    el.style.left = '50%'; el.style.right = 'auto';
                    el.style.transform = 'translateX(-50%)';
                }
            }

            applyFreePosition(tb, x, y) {
                const el = tb.el;
                el.style.transition = 'none';
                delete el.dataset.dockedSide;
                el.style.transform = 'none';
                el.style.left = `${x}px`; el.style.top = `${y}px`;
                el.style.right = 'auto'; el.style.bottom = 'auto';
                
                const container = document.getElementById('drawing-board');
                const rect = container.getBoundingClientRect();
                const distTop = y; const distBottom = rect.height - y;
                const distLeft = x; const distRight = rect.width - x;
                const min = Math.min(distTop, distBottom, distLeft, distRight);
                if (min === distTop || min === distBottom) this.setOrientation(tb, 'h');
                else this.setOrientation(tb, 'v');
            }

            syncSubBar(mainTB = null) {
                if (!mainTB) mainTB = this.toolbars.find(t => t.id === 'tb-board');
                const subBarObj = this.toolbars.find(t => t.id === mainTB.subBarId);
                if (!subBarObj || subBarObj.el.classList.contains('hidden')) return;

                const mainEl = mainTB.el;
                const subEl = subBarObj.el;
                
                const isHorizontal = mainEl.classList.contains('orientation-h');
                this.setOrientation(subBarObj, isHorizontal ? 'h' : 'v');

                const mainRect = mainEl.getBoundingClientRect();
                const containerRect = document.getElementById('drawing-board').getBoundingClientRect();
                const mainX = mainRect.left - containerRect.left;
                const mainY = mainRect.top - containerRect.top;

                const cx = mainRect.left + mainRect.width / 2;
                const cy = mainRect.top + mainRect.height / 2;
                const distTop = cy; const distBottom = window.innerHeight - cy;
                const distLeft = cx; const distRight = window.innerWidth - cx;
                const min = Math.min(distTop, distBottom, distLeft, distRight);

                let side = (mainEl.dataset.dockedSide || 'free');
                if (side === 'free' || side === undefined) {
                    if (min === distTop) side = 'top';
                    else if (min === distBottom) side = 'bottom';
                    else if (min === distLeft) side = 'left';
                    else side = 'right';
                }

                subEl.style.transform = 'none';

                if (isHorizontal) {
                    if (side === 'top') {
                        const y = mainY + mainRect.height + this.gap;
                        subEl.style.top = `${y}px`;
                    } else {
                        const y = mainY - subEl.getBoundingClientRect().height - this.gap;
                        subEl.style.top = `${y}px`;
                    }
                    const x = mainX + (mainRect.width - subEl.getBoundingClientRect().width)/2;
                    subEl.style.left = `${x}px`;
                    subEl.style.bottom = 'auto'; subEl.style.right = 'auto';
                } else {
                    if (side === 'left') {
                        const x = mainX + mainRect.width + this.gap;
                        subEl.style.left = `${x}px`;
                    } else {
                        const x = mainX - subEl.getBoundingClientRect().width - this.gap;
                        subEl.style.left = `${x}px`;
                    }
                    const y = mainY + (mainRect.height - subBarObj.el.getBoundingClientRect().height)/2;
                    subEl.style.top = `${y}px`;
                    subEl.style.bottom = 'auto'; subEl.style.right = 'auto';
                }
            }
        }

        // --- APP INITIALIZATION ---
        let board, toolbarManager;

        function zoomAction(delta) {
            const rect = document.getElementById('drawing-board').getBoundingClientRect();
            board.zoom(delta, rect.width/2 + rect.left, rect.height/2 + rect.top);
        }

        function updateToolUI(tool) {
            board.setTool(tool);
        }

        document.addEventListener('DOMContentLoaded', () => {
            CanvasBoardInstance = new CanvasBoard('drawing-board', 'artboard');
            board = CanvasBoardInstance;
            toolbarManager = new ToolbarManager();

            document.querySelectorAll('[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => updateToolUI(btn.dataset.tool));
            });

            document.getElementById('color-picker').addEventListener('input', (e) => {
                board.setColor(e.target.value);
            });

            document.getElementById('brush-size').addEventListener('input', (e) => {
                board.brushSize = parseInt(e.target.value);
            });

            document.getElementById('zoom-reset').addEventListener('click', () => board.centerView());

            document.getElementById('sym-toggle-btn').addEventListener('click', () => SymmetryEngine.toggle());
            document.getElementById('sym-type-ref').addEventListener('click', () => SymmetryEngine.setType('reflection'));
            document.getElementById('sym-type-rep').addEventListener('click', () => SymmetryEngine.setType('repeat'));
            
            // Sliders
            const offsetSlider = document.getElementById('sym-offset');
            offsetSlider.addEventListener('input', (e) => SymmetryEngine.updateFromOffset(e.target.value));
            
            const angleSlider = document.getElementById('sym-angle');
            angleSlider.addEventListener('input', (e) => SymmetryEngine.updateFromAngle(e.target.value));

            const linesSlider = document.getElementById('sym-lines');
            linesSlider.addEventListener('input', (e) => {
                SymmetryEngine.lines = parseInt(e.target.value);
                document.getElementById('val-lines').innerText = SymmetryEngine.lines;
                board.drawGuides();
            });

            document.getElementById('sym-snap-btn').addEventListener('click', () => {
                // Reset position to center, but KEEP current angle
                SymmetryEngine.init(board.canvas.width, board.canvas.height);
                
                // Update UI sliders to match new state
                document.getElementById('sym-offset').value = 0;
                document.getElementById('val-offset').innerText = 0;
                
                // Preserve current angle in UI
                document.getElementById('sym-angle').value = Math.round(SymmetryEngine.angle);
                document.getElementById('val-angle').innerText = Math.round(SymmetryEngine.angle);
                
                board.drawGuides();
            });

            document.getElementById('sym-reset-angle-btn').addEventListener('click', () => {
                // Reset Angle via Slider (Polar behavior)
                SymmetryEngine.updateFromAngle(0);
            });
        });
    </script>
